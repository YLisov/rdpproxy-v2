# Стек для разработки — сборка из исходников (build: .).
# Для продакшена / пользователей используйте docker-compose.yml (готовые образы Docker Hub).
#
# Запуск: docker compose -f docker-compose.dev.yml up -d
#
# Ротация логов контейнеров (json-file): ограничение роста docker logs на диске.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: rdpproxy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: rdpproxy
    networks:
      - rdpproxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdpproxy"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - rdpproxy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging: *default-logging
    restart: unless-stopped

  haproxy:
    image: haproxy:2.9-alpine
    ports:
      - "${PUBLIC_PORT:-443}:443"
    volumes:
      - ./deploy/haproxy:/usr/local/etc/haproxy:ro
      - ./deploy/haproxy/run:/var/run/haproxy
    networks:
      - rdpproxy
    depends_on:
      portal:
        condition: service_healthy
      rdp-relay:
        condition: service_started
    sysctls:
      - net.ipv4.tcp_congestion_control=bbr
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
    logging: *default-logging
    restart: unless-stopped

  portal:
    build: .
    command: python -m services.portal.main
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - rdpproxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging: *default-logging
    restart: unless-stopped

  rdp-relay:
    build: .
    command: python -m services.rdp_relay.main
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./deploy/haproxy/certs:/app/certs:ro
    group_add:
      - "988"
    networks:
      - rdpproxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    sysctls:
      - net.ipv4.tcp_congestion_control=bbr
      - net.ipv4.tcp_rmem=4096 262144 16777216
      - net.ipv4.tcp_wmem=4096 262144 16777216
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    logging: *default-logging
    restart: unless-stopped

  admin:
    build: .
    command: python -m services.admin.main
    ports:
      - "80:80"
      - "${LAN_IP:-0.0.0.0}:9090:9090"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./.env:/app/.env
      - ./deploy/haproxy/certs:/app/certs
      - ./deploy/haproxy/run:/var/run/haproxy
    networks:
      - rdpproxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9090/admin/login')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging: *default-logging
    restart: unless-stopped

  metrics:
    build: .
    command: python -m services.metrics.main
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - /proc:/host/proc:ro
    networks:
      - rdpproxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging: *default-logging
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

networks:
  rdpproxy:
    driver: bridge
