global
    log stdout format raw local0 info
    maxconn 4096
    tune.ssl.default-dh-param 2048

defaults
    log     global
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# ── Port 8443: L4 multiplexer (RDP vs HTTPS) ──────────────────────
# First byte 0x03 = TPKT (RDP), 0x16 = TLS ClientHello (HTTPS).
frontend ft_mux
    bind :8443
    mode tcp
    tcp-request inspect-delay 2s
    tcp-request content accept if { req.payload(0,1) -m bin 03 }
    tcp-request content accept if { req.ssl_hello_type 1 }

    acl is_rdp req.payload(0,1) -m bin 03
    use_backend bk_rdp if is_rdp
    default_backend bk_portal_tls

# RDP: TCP passthrough to rdp-relay with Proxy Protocol v2
backend bk_rdp
    mode tcp
    timeout server 24h
    server rdp-relay rdp-relay:8002 send-proxy-v2

# HTTPS: forward to internal TLS-terminating listener
backend bk_portal_tls
    mode tcp
    server loopback 127.0.0.1:8444 send-proxy-v2

# ── Internal HTTPS frontend (TLS termination) ─────────────────────
frontend ft_portal_https
    bind 127.0.0.1:8444 accept-proxy ssl crt /usr/local/etc/haproxy/certs/rdp.pem
    mode http
    option forwardfor
    http-request set-header X-Real-IP %[src]
    default_backend bk_portal

backend bk_portal
    mode http
    server portal portal:8001 check inter 5s rise 2 fall 3

# ── Port 9090: Admin panel (LAN-only, bound by docker-compose) ────
frontend ft_admin
    bind :9090
    mode http
    option forwardfor
    http-request set-header X-Real-IP %[src]
    default_backend bk_admin

backend bk_admin
    mode http
    server admin admin:9090 check inter 5s rise 2 fall 3
