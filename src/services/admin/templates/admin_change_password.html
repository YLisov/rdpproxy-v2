<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Смена пароля администратора</title>
  <style>
    :root { --bg:#f6f8fb; --fg:#111827; --card:#fff; --border:#dbe2ea; --primary:#2563eb; --err:#b00020; }
    body { font-family: Arial, sans-serif; max-width: 420px; margin: 48px auto; padding: 0 16px; background: var(--bg); color: var(--fg); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    form { display: grid; gap: 12px; }
    label { display: grid; gap: 4px; font-weight: 600; }
    input, button { padding: 10px; font-size: 14px; border-radius: 8px; border: 1px solid var(--border); }
    button { background: var(--primary); color: #fff; border: none; cursor: pointer; }
    .error { color: var(--err); }
    .muted { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Смена пароля</h1>
  <p class="muted">Пользователь: <strong>{{ admin.username }}</strong></p>
  <div class="card">
    <form method="post" action="/admin/change-password">
      <input type="hidden" name="csrf_token" value="{{ csrf_token or '' }}">
      <label>Текущий пароль <input type="password" name="current_password" required autocomplete="current-password"></label>
      <label>Новый пароль <input type="password" name="new_password" required minlength="8" autocomplete="new-password"></label>
      <label>Подтверждение <input type="password" name="new_password2" required minlength="8" autocomplete="new-password"></label>
      <button type="submit">Сохранить</button>
    </form>
  </div>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
</body>
</html>
